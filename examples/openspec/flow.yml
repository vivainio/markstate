# OpenSpec-style flow. Place this at openspec/flow.yml.
# Use `markstate focus add-dark-mode` to work on a specific change.
#
# Directory layout:
#   openspec/
#     flow.yml            ← this file
#     specs/              ← source of truth (managed separately)
#     changes/            ← docs_root points here
#       add-dark-mode/
#         proposal.md
#         design.md
#         specs/          ← delta specs (ADDED/MODIFIED/REMOVED requirements)
#           ui/spec.md
#         tasks.md

docs_root: changes

phases:
  - name: speccing
    produces:
      - file: proposal.md
        template: |
          ---
          status: draft
          ---

          # Proposal

          ## Intent

          <!-- What are we building and why does it matter? -->

          ## Scope

          <!-- In scope: -->
          <!-- Out of scope: -->
      - file: design.md
        template: |
          ---
          status: draft
          ---

          # Design

          ## Approach

          <!-- How will this be built? Key decisions and trade-offs. -->

          ## Affected areas

          <!-- Files, modules, APIs, or systems that will change. -->
      - dir: specs/*
        files:
          - file: spec.md
            template: |
              ---
              status: draft
              ---

              # Delta Spec

              ## ADDED Requirements

              <!-- ### Requirement: ...
              #### Scenario: ... -->

              ## MODIFIED Requirements

              ## REMOVED Requirements
    advance_when:
      - file: proposal.md
        status: accepted
      - file: design.md
        status: accepted
      - glob: "specs/*/spec.md"
        all_status: accepted

  - name: implementing
    gates:
      - file: proposal.md
        status: accepted
      - file: design.md
        status: accepted
    produces:
      - file: tasks.md
        template: |
          # Tasks

          <!-- High-level work units. Claude plans sub-steps in plan mode. -->

          - [ ]
        auto: true
    advance_when:
      - file: tasks.md
        tasks: all_done

  - name: done
    gates:
      - file: tasks.md
        tasks: all_done

transitions:
  - name: accept
    from: draft
    to: accepted
  - name: reopen
    from: accepted
    to: draft
