# Canonical flow definition, maintained in the docs/tooling repo.
# Source repos reference this via a redirect stub.

docs_root: changes

# Shared annotation blocks, reused via YAML aliases (*name) below.
# Keys under `_anchors` are ignored by markstate.
_anchors:
  creation: &creation
    once-created-at: now
    once-created-by: me
  acceptance: &acceptance
    accepted-at: now
    accepted-by: me
    once-first-accepted-at: now

phases:
  - name: drafting
    produces:
      - file: proposal.md
        template: |
          ---
          status: draft
          ---

          # Proposal
        set: *creation
    advance_when:
      - file: proposal.md
        status: accepted

  - name: implementing
    gates:
      - file: proposal.md
        status: accepted
    produces:
      - file: tasks.md
        template: |
          # Tasks
          - [ ]
        auto: true
        set: *creation
    advance_when:
      - file: tasks.md
        tasks: all_done

  - name: done
    gates:
      - file: tasks.md
        tasks: all_done

transitions:
  - name: accept
    from: draft
    to: accepted
    set: *acceptance
  - name: reopen
    from: accepted
    to: draft
