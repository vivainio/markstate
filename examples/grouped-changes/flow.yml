# Spec-driven development with changes grouped by area.
# Use `markstate new changes/auth/add-oauth` to start a new change.
# Use `markstate focus add-oauth` to work on a specific change.
#
# Directory layout:
#   changes/
#     auth/
#       add-oauth/
#         proposal.md
#         spec.md
#         tasks.md
#     billing/
#       fix-invoices/
#         proposal.md
#         ...

# Shared annotation blocks, reused via YAML aliases (*name) below.
# Keys under `_anchors` are ignored by markstate.
_anchors:
  creation: &creation
    once-created-at: now
    once-created-by: me
  acceptance: &acceptance
    accepted-at: now
    accepted-by: me
    once-first-accepted-at: now

phases:
  - name: drafting
    produces:
      - dir: changes/<area>/<change>
        files:
          - file: proposal.md
            template: |
              ---
              status: draft
              ---

              # Proposal

              ## Problem

              <!-- What is broken or missing? -->

              ## Solution

              <!-- How will you fix it? -->
            set: *creation
    advance_when:
      - file: proposal.md
        status: accepted

  - name: speccing
    gates:
      - file: proposal.md
        status: accepted
    produces:
      - file: spec.md
        template: |
          ---
          status: draft
          ---

          # Specification

          ## Functional requirements

          <!-- What must the solution do? -->

          ## Technical design

          <!-- How will it be built? -->
        auto: true
        set: *creation
    advance_when:
      - file: spec.md
        status: accepted

  - name: implementing
    gates:
      - file: spec.md
        status: accepted
    produces:
      - file: tasks.md
        template: |
          # Tasks

          <!-- Each item is a high-level work unit, not a step-by-step procedure.
               Claude will plan the implementation details in plan mode.
               Examples:
                 - [ ] Add authentication middleware
                 - [ ] Write integration tests for login flow
                 - [ ] Update API docs -->

          - [ ]
        auto: true
        set: *creation
    advance_when:
      - file: tasks.md
        tasks: all_done

  - name: done
    gates:
      - file: tasks.md
        tasks: all_done

transitions:
  - name: accept
    from: draft
    to: accepted
    set: *acceptance
  - name: reopen
    from: accepted
    to: draft
